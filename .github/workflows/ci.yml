name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm --filter "@research-copilot/types" build && pnpm --filter "@research-copilot/api-sdk" build && pnpm --filter "@research-copilot/ui" build

      - name: Type check web
        run: pnpm --filter "@research-copilot/web" exec tsc --noEmit

      - name: Type check desktop
        run: pnpm --filter "@research-copilot/desktop" exec tsc --noEmit

  backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ruff
        working-directory: backend

      - name: Lint
        run: ruff check .
        working-directory: backend
