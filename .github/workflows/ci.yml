name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      # packages expose TypeScript source directly (no build step needed)
      - name: Type check web
        run: pnpm --filter "@research-copilot/web" exec tsc --noEmit

      - name: Type check desktop
        run: pnpm --filter "@research-copilot/desktop" exec tsc --noEmit

