name: Mobile Release (EAS)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Build platform"
        required: true
        default: "android"
        type: choice
        options: [android]
      profile:
        description: "Build profile"
        required: true
        default: "preview"
        type: choice
        options: [development, preview, production]

jobs:
  # Check whether EXPO_TOKEN is configured; downstream jobs depend on this output
  check-token:
    name: Check EXPO_TOKEN
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::EXPO_TOKEN is not set — skipping EAS build"
          fi

  build:
    name: EAS Build
    runs-on: ubuntu-latest
    needs: check-token
    if: needs.check-token.outputs.configured == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Sync versions from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/sync-version.mjs --tag "${{ github.ref_name }}"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (tag push → production)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: apps/mobile
        run: eas build --platform android --profile production --non-interactive

      - name: Build (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        working-directory: apps/mobile
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive

  update-release-notes:
    name: Update Release Notes
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Append mobile build info to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_BODY=$(gh release view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" --json body -q .body 2>/dev/null || echo "")
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --notes "${CURRENT_BODY}

          ---
          ### 移动端
          仅构建 Android APK，可在 [Expo Dashboard](https://expo.dev) 下载测试包。"
