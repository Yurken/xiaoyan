name: Mobile Build (EAS)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Build platform"
        required: true
        default: "android"
        type: choice
        options: [android]
      profile:
        description: "Build profile"
        required: true
        default: "preview"
        type: choice
        options: [development, preview]

permissions:
  contents: read

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Check whether EXPO_TOKEN is configured; downstream jobs depend on this output
  check-token:
    name: Check EXPO_TOKEN
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::EXPO_TOKEN is not set — skipping EAS build"
          fi

  build:
    name: EAS Build
    runs-on: ubuntu-latest
    needs: check-token
    if: needs.check-token.outputs.configured == 'true'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (manual dispatch)
        working-directory: apps/mobile
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive
