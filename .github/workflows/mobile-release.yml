name: Mobile Release (EAS)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Build platform"
        required: true
        default: "all"
        type: choice
        options: [all, ios, android]
      profile:
        description: "Build profile"
        required: true
        default: "preview"
        type: choice
        options: [development, preview, production]

# Expose secret as env var so job `if` conditions can check it
env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    # Skip if EXPO_TOKEN secret is not configured
    if: ${{ env.EXPO_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (tag push → production)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: apps/mobile
        run: eas build --platform all --profile production --non-interactive

      - name: Build (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        working-directory: apps/mobile
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive

  # Append mobile build note to the GitHub Release created by desktop workflow
  update-release-notes:
    name: Update Release Notes
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Append mobile build info to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_BODY=$(gh release view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" --json body -q .body 2>/dev/null || echo "")
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --notes "${CURRENT_BODY}

          ---
          ### 移动端
          iOS / Android 构建已提交至 EAS，可在 [Expo Dashboard](https://expo.dev) 下载或直接通过 TestFlight / Google Play 获取。"

  submit:
    name: Submit to Stores
    runs-on: ubuntu-latest
    needs: build
    if: ${{ env.EXPO_TOKEN != '' && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to App Store & Google Play
        working-directory: apps/mobile
        run: eas submit --platform all --latest --non-interactive
