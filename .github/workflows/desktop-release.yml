name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Stage 1: Create draft release ─────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create or update draft release
        id: release
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseName = `智研 Copilot ${tag}`;
            const body = `## 智研 Copilot ${tag}

            ### 下载说明
            - **macOS Apple Silicon** -> .dmg (aarch64)
            - **macOS Intel** -> .dmg (x86_64)
            - **Windows** -> .msi 或 .exe

            > 首次安装 macOS 版本如提示"无法验证"，请前往系统设置 -> 隐私与安全性 -> 仍要打开。`;
            const prerelease = tag.includes('-');

            let release;
            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = (
                await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: existing.data.id,
                  tag_name: tag,
                  name: releaseName,
                  body,
                  draft: true,
                  prerelease,
                })
              ).data;
            } catch (error) {
              if (error.status !== 404) throw error;
              release = (
                await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: tag,
                  name: releaseName,
                  body,
                  draft: true,
                  prerelease,
                })
              ).data;
            }

            core.setOutput('release_id', String(release.id));

  # ── Stage 2: Build all platforms (parallel) ───────────────────
  build:
    name: Build (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - label: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
          - label: Windows x64
            platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build & upload artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Ad-hoc sign macOS builds when no Apple Developer cert is configured.
          # "-" means ad-hoc; prevents "app is damaged" rejection on macOS 13+.
          # Override with APPLE_CERTIFICATE secret for proper notarized signing.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # ── Stage 3: Publish release after all builds succeed ─────────
  publish-release:
    name: Publish Release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (remove draft)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false
