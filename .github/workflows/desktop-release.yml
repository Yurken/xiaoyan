name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish, e.g. v0.4.1 or revision v0.4.1.1"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  preflight:
    name: Release Preflight
    runs-on: macos-latest
    timeout-minutes: 30
    environment: release
    steps:
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+|[-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi

      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync versions from tag
        run: node scripts/sync-version.mjs --tag "${{ env.RELEASE_TAG }}"

      - name: Type check workspace
        run: pnpm type-check

      - name: Lint workspace
        run: pnpm lint

      - name: Run desktop unit and component tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm --dir apps/desktop exec playwright install --with-deps chromium

      - name: Run desktop end-to-end tests
        run: pnpm test:e2e
        env:
          CI: "1"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      # 仅机械功能：`cargo test` 默认跳过 #[ignore] 用例，
      # 真实 AI 联通测试（ai_live_*）不进打包流水线，仅本地手动 `scripts/test-ai-local.sh`。
      - name: Run desktop Rust tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

  # ── Stage 1: Create draft release ─────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Recreate draft release
        id: release
        uses: actions/github-script@v7.0.1
        env:
          TAG_NAME: ${{ env.RELEASE_TAG }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseName = `小妍 ${tag}`;
            const body = `## 小妍 ${tag}

            ### 下载说明
            - **macOS Apple Silicon** -> .dmg (aarch64)
            - **Windows** -> .msi 或 .exe
            - **Linux x64** -> .AppImage / .deb / .rpm

            > 首次安装 macOS 版本如提示"无法验证"，请前往系统设置 -> 隐私与安全性 -> 仍要打开。`;
            const prerelease = tag.includes('-');

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              if (!existing.data.draft) {
                throw new Error(`Release ${tag} is already published. Delete it manually before rerunning this workflow.`);
              }
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: existing.data.id,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const release = (
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body,
                draft: true,
                prerelease,
              })
            ).data;

            core.setOutput('release_id', String(release.id));

  # ── Stage 2: Build all platforms (parallel) ───────────────────
  build:
    name: Build (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
            build_target_dir: aarch64-apple-darwin/release
            updater_target: darwin-aarch64
          - label: Windows x64
            platform: windows-latest
            args: ""
            rust_target: ""
            build_target_dir: release
            updater_target: windows-x86_64
          - label: Linux x64
            platform: ubuntu-22.04
            args: ""
            rust_target: ""
            build_target_dir: release
            updater_target: linux-x86_64

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync versions from tag
        run: node scripts/sync-version.mjs --tag "${{ env.RELEASE_TAG }}"

      - name: Build application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

      - name: Collect release installers
        shell: bash
        run: |
          set -euo pipefail
          bundle_root="apps/desktop/src-tauri/target/${{ matrix.build_target_dir }}/bundle"
          output_dir=".release-artifacts/release-${{ matrix.updater_target }}"
          node scripts/collect-release-installers.mjs \
            --input-dir "$bundle_root" \
            --output-dir "$output_dir"
          ls -l "$output_dir"

      - name: Install AWS CLI
        shell: bash
        run: |
          if command -v aws &> /dev/null; then
            echo "AWS CLI already installed"
            aws --version
            exit 0
          fi
          case "$RUNNER_OS" in
            macOS)
              curl -fsSL "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o "AWSCLIV2.pkg"
              sudo installer -pkg AWSCLIV2.pkg -target /
              ;;
            Windows)
              curl -fsSL "https://awscli.amazonaws.com/AWSCLIV2.msi" -o "AWSCLIV2.msi"
              msiexec.exe /i AWSCLIV2.msi /qn
              ;;
            Linux)
              pip install awscli
              ;;
          esac
          aws --version

      - name: Upload release installers to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp .release-artifacts/release-${{ matrix.updater_target }}/ \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/${{ env.RELEASE_TAG }}/${{ matrix.updater_target }}/ \
            --recursive \
            --endpoint-url $AWS_ENDPOINT_URL

      - name: Collect updater bundles
        shell: bash
        run: |
          set -euo pipefail
          bundle_root="apps/desktop/src-tauri/target/${{ matrix.build_target_dir }}/bundle"
          output_dir=".updater-artifacts/updater-${{ matrix.updater_target }}"
          mkdir -p "$output_dir"
          find "$bundle_root" -type f \
            \( \
              -name '*.app.tar.gz' -o \
              -name '*.app.tar.gz.sig' -o \
              -name '*.exe' -o \
              -name '*.exe.sig' -o \
              -name '*.msi' -o \
              -name '*.msi.sig' -o \
              -name '*.nsis.zip' -o \
              -name '*.nsis.zip.sig' -o \
              -name '*.msi.zip' -o \
              -name '*.msi.zip.sig' -o \
              -name '*.AppImage' -o \
              -name '*.AppImage.sig' -o \
              -name '*.AppImage.tar.gz' -o \
              -name '*.AppImage.tar.gz.sig' \
            \) \
            -exec cp '{}' "$output_dir/" ';'
          test -n "$(find "$output_dir" -type f | head -n 1)"
          ls -l "$output_dir"

      - name: Upload updater bundles to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp .updater-artifacts/updater-${{ matrix.updater_target }}/ \
            s3://${{ secrets.R2_BUCKET_NAME }}/updaters/${{ env.RELEASE_TAG }}/${{ matrix.updater_target }}/ \
            --recursive \
            --endpoint-url $AWS_ENDPOINT_URL

  # ── Stage 3: Download from R2 and upload to GitHub Release ─────
  publish-github-assets:
    name: Upload GitHub Release Assets
    needs: [create-release, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Install AWS CLI
        run: pip install awscli

      - name: Download release installers from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          AWS_DEFAULT_REGION: auto
        run: |
          mkdir -p .release-assets
          for target in darwin-aarch64 windows-x86_64 linux-x86_64; do
            aws s3 cp s3://${{ secrets.R2_BUCKET_NAME }}/releases/${{ env.RELEASE_TAG }}/${target}/ \
              .release-assets/ \
              --recursive \
              --endpoint-url $AWS_ENDPOINT_URL
          done
          ls -l .release-assets

      - name: Upload installers to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$(ls -A .release-assets 2>/dev/null)" ]; then
            echo "No release assets found"
            exit 1
          fi
          gh release upload "${{ env.RELEASE_TAG }}" \
            .release-assets/* \
            --repo "${{ github.repository }}" \
            --clobber

  publish-manifests:
    name: Publish R2 Manifests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install AWS CLI
        run: pip install awscli

      - name: Download artifacts from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          for target in darwin-aarch64 windows-x86_64 linux-x86_64; do
            mkdir -p ".updater-assets/${target}" ".release-assets/${target}"
            aws s3 cp s3://${{ secrets.R2_BUCKET_NAME }}/updaters/${{ env.RELEASE_TAG }}/${target}/ \
              ".updater-assets/${target}/" --recursive --endpoint-url "$AWS_ENDPOINT_URL"
            aws s3 cp s3://${{ secrets.R2_BUCKET_NAME }}/releases/${{ env.RELEASE_TAG }}/${target}/ \
              ".release-assets/${target}/" --recursive --endpoint-url "$AWS_ENDPOINT_URL"
          done
          find .updater-assets .release-assets -type f

      - name: Generate manifests
        env:
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${R2_PUBLIC_BASE_URL:-}" ]; then
            echo "Missing R2_PUBLIC_BASE_URL secret" >&2
            exit 1
          fi
          base="${R2_PUBLIC_BASE_URL%/}"
          node scripts/generate-updater-manifest.mjs \
            --input-dir .updater-assets \
            --base-url "${base}/updaters/${{ env.RELEASE_TAG }}" \
            --version "${{ env.RELEASE_TAG }}" \
            --output updaters-latest.json
          node scripts/generate-download-manifest.mjs \
            --input-dir .release-assets \
            --base-url "${base}/releases/${{ env.RELEASE_TAG }}" \
            --version "${{ env.RELEASE_TAG }}" \
            --output releases-latest.json
          echo "--- updaters/latest.json ---"; cat updaters-latest.json
          echo "--- releases/latest.json ---"; cat releases-latest.json

      - name: Upload manifests to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          bucket="${{ secrets.R2_BUCKET_NAME }}"
          tag="${{ env.RELEASE_TAG }}"
          for dest in "updaters/latest.json" "updaters/${tag}/latest.json"; do
            aws s3 cp updaters-latest.json "s3://${bucket}/${dest}" \
              --content-type application/json --cache-control "no-cache" \
              --endpoint-url "$AWS_ENDPOINT_URL"
          done
          for dest in "releases/latest.json" "releases/${tag}/latest.json"; do
            aws s3 cp releases-latest.json "s3://${bucket}/${dest}" \
              --content-type application/json --cache-control "no-cache" \
              --endpoint-url "$AWS_ENDPOINT_URL"
          done

  # ── Stage 4: Publish release after all builds succeed ─────────
  publish-release:
    name: Publish Release
    needs: [create-release, build, publish-github-assets, publish-manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Publish release (remove draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ env.RELEASE_TAG }}" \
            --repo "${{ github.repository }}" \
            --draft=false
