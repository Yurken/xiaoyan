name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Stage 1: Create draft release ─────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Recreate draft release
        id: release
        uses: actions/github-script@v7.0.1
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseName = `小妍 ${tag}`;
            const body = `## 小妍 ${tag}

            ### 下载说明
            - **macOS Apple Silicon** -> .dmg (aarch64)
            - **macOS Intel** -> .dmg (x86_64)
            - **Windows** -> .msi 或 .exe

            > 首次安装 macOS 版本如提示"无法验证"，请前往系统设置 -> 隐私与安全性 -> 仍要打开。`;
            const prerelease = tag.includes('-');

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: existing.data.id,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const release = (
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body,
                draft: true,
                prerelease,
              })
            ).data;

            core.setOutput('release_id', String(release.id));

  # ── Stage 2: Build all platforms (parallel) ───────────────────
  build:
    name: Build (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: self-hosted
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
            build_target_dir: aarch64-apple-darwin/release
            updater_target: darwin-aarch64
          - label: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
            build_target_dir: x86_64-apple-darwin/release
            updater_target: darwin-x86_64
          - label: Windows x64
            platform: self-hosted
            args: ""
            rust_target: ""
            build_target_dir: release
            updater_target: windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Sync versions from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/sync-version.mjs --tag "${{ github.ref_name }}"

      - name: Build & upload artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Ad-hoc sign macOS builds when no Apple Developer cert is configured.
          # "-" means ad-hoc; prevents "app is damaged" rejection on macOS 13+.
          # Override with APPLE_CERTIFICATE secret for proper notarized signing.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

      - name: Collect release installers
        shell: bash
        run: |
          set -euo pipefail
          bundle_root="apps/desktop/src-tauri/target/${{ matrix.build_target_dir }}/bundle"
          output_dir=".release-artifacts/release-${{ matrix.updater_target }}"
          node scripts/collect-release-installers.mjs \
            --input-dir "$bundle_root" \
            --output-dir "$output_dir"
          ls -l "$output_dir"

      - name: Upload release installers
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.updater_target }}
          path: .release-artifacts/release-${{ matrix.updater_target }}
          if-no-files-found: error

      - name: Collect updater bundles
        shell: bash
        run: |
          set -euo pipefail
          bundle_root="apps/desktop/src-tauri/target/${{ matrix.build_target_dir }}/bundle"
          output_dir=".updater-artifacts/updater-${{ matrix.updater_target }}"
          mkdir -p "$output_dir"
          find "$bundle_root" -type f \
            \( \
              -name '*.app.tar.gz' -o \
              -name '*.app.tar.gz.sig' -o \
              -name '*.exe' -o \
              -name '*.exe.sig' -o \
              -name '*.msi' -o \
              -name '*.msi.sig' -o \
              -name '*.nsis.zip' -o \
              -name '*.nsis.zip.sig' -o \
              -name '*.msi.zip' -o \
              -name '*.msi.zip.sig' \
            \) \
            -exec cp '{}' "$output_dir/" ';'
          test -n "$(find "$output_dir" -type f | head -n 1)"
          ls -l "$output_dir"

      - name: Upload updater bundles
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.updater_target }}
          path: .updater-artifacts/updater-${{ matrix.updater_target }}
          if-no-files-found: error

  publish-github-assets:
    name: Upload GitHub Release Assets
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release installers
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: .release-assets
          merge-multiple: true

      - name: Upload installers to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ls -l .release-assets
          gh release upload "${{ github.ref_name }}" \
            .release-assets/* \
            --repo "${{ github.repository }}" \
            --clobber

  # Server publishing is intentionally disabled for now.
  # Current release policy: only publish installers to GitHub Release.
  # To restore website/server distribution later, reintroduce the
  # `publish-server-installers` and `publish-updater` jobs here.

  # ── Stage 3: Publish release after all builds succeed ─────────
  publish-release:
    name: Publish Release
    needs: [create-release, build, publish-github-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (remove draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false
