services:
  db:
    image: pgvector/pgvector:pg16
    container_name: research_copilot_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: research_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - research_copilot_db_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: research_copilot_redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    image: minio/minio:latest
    container_name: research_copilot_minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - research_copilot_minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  research_copilot_db_data:
    name: research_copilot_db_data
  research_copilot_minio_data:
    name: research_copilot_minio_data
